name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            Review this PR for:
            - Code quality and best practices
            - Potential bugs or logic errors
            - Security vulnerabilities
            - Performance concerns
            Post concise, actionable inline comments on specific lines where issues are found.
            Use Chinese (Simplified) for all review comments.
          allowed_tools: "mcp__github__create_pull_request_review,mcp__github__get_pull_request_diff,mcp__github__get_pull_request_files"
